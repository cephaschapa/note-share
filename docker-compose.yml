services:
  postgres:
    image: postgres:16
    container_name: note_share_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: notes_user
      POSTGRES_PASSWORD: notes_password
      POSTGRES_DB: note_share
    ports:
      - "5432:5432"
    volumes:
      - note_share_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes_user -d note_share"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: note_share_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: note_share_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://notes_user:notes_password@postgres:5432/note_share?schema=public
      PORT: 4000
      JWT_SECRET: super_secret_change_me
      UPLOAD_DIR: /app/uploads
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      AWS_REGION: ${AWS_REGION:-af-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
    ports:
      - "4000:4000"
    volumes:
      - note_share_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: note_share_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://notes_user:notes_password@postgres:5432/note_share?schema=public
      JWT_SECRET: super_secret_change_me
      UPLOAD_DIR: /app/uploads
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      AWS_REGION: ${AWS_REGION:-af-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
    volumes:
      - note_share_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api
    container_name: note_share_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  note_share_pgdata:
  note_share_uploads:
