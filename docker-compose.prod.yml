services:
  redis:
    image: redis:7
    container_name: note_share_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - note_share_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: note_share_api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: 4000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    expose:
      - "4000"
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: note_share_worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: note_share_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    expose:
      - "3000"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    container_name: note_share_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # We will enable 443 after SSL setup
      # - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  note_share_redis_data:
